<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Project M - Cloud & Factory Flasher</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>

</head>
<body>
<div class="wrap">

  <!-- FLASHER -->
  <div class="card">
    <h2>⚡ Factory Web Flasher</h2>
    <p class="subtitle">
      Connect ESP board with USB and click Install.
    </p>

    <div class="row">
      <esp-web-install-button manifest="firmware/manifest.json"></esp-web-install-button>
    </div>
  </div>

  <!-- CLOUD -->
  <div class="card">
    <h2>Connectivity & Cloud Credentials</h2>

    <div class="grid2">

      <div>
        <label>Connectivity Mode</label>
        <select id="connectivity">
          <option>Firebase</option>
          <option>MQTT</option>
          <option>Offline</option>
        </select>
      </div>

      <div>
        <label>Device Role</label>
        <select id="role">
          <option>Mother Hub</option>
          <option>Child Node</option>
          <option selected>Hybrid</option>
        </select>
      </div>

      <div>
        <label>WiFi SSID</label>
        <input id="ssid" placeholder="WiFi Name">
      </div>

      <div>
        <label>WiFi Password</label>
        <input id="pass" placeholder="WiFi Password">
      </div>

    </div>
  </div>

  <!-- BOARD -->
  <div class="card">
    <h2>Select Board</h2>

    <select id="boardSelect">
      <option>ESP32-S3-DevKitC N16R8</option>
      <option>ESP32-S3-WROOM-1</option>
      <option>ESP32-WROVER</option>
      <option>ESP32 DevKit V1</option>
      <option>ESP8266 NodeMCU</option>
    </select>
  </div>

  <!-- ROOM CONFIG -->
  <div class="card">
    <h2>Rooms & Devices</h2>

    <div id="roomList"></div>

    <div class="row">
      <button onclick="addRoom()">+ Add Room</button>
    </div>
  </div>

  <!-- SAVE -->
  <div class="card">
    <h2>Cloud Sync</h2>

    <p class="subtitle">
      Save full setup to Firebase.
    </p>

    <div class="row">
      <button onclick="buildNow()">Save Config to Cloud</button>
    </div>

    <div class="log" id="log">Ready...</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
