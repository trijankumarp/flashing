<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M-OS Company Flasher</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a0a; color:#e0e0e0; font-family:Arial,sans-serif; padding:20px; }
    .card { background:#121212; border:1px solid #333; border-radius:16px; padding:20px; margin:18px 0; }
    h1 { text-align:center; margin-bottom:25px; color:#fff; }
    h2 { margin-bottom:12px; color:#fff; }
    select, input { width:100%; padding:12px; margin:8px 0; background:#1e1e1e; border:1px solid #444; border-radius:8px; color:#fff; }
    button { padding:12px 20px; margin:5px; border:none; border-radius:8px; background:#e53935; color:white; cursor:pointer; font-weight:600; }
    button:hover { background:#c62828; }
    .role-btn { background:#333; }
    .role-btn.active { background:#e53935; }
    .add-btn { background:#4CAF50; }
    .flash-btn { background:#2196F3; font-size:16px; padding:14px 24px; }
    .room-card { background:#1a1a1e; padding:15px; margin:12px 0; border-radius:12px; border:1px solid #444; }
    .relay-row { display:grid; grid-template-columns: 90px 130px 1fr; gap:10px; margin:8px 0; }
    .log { background:#000; padding:15px; border-radius:10px; min-height:180px; white-space:pre-wrap; font-family:Consolas,monospace; color:#0f0; overflow:auto; }
  </style>
</head>
<body>
  <h1>M-OS Company Flasher</h1>

  <!-- Connectivity & Cloud Credentials -->
  <div class="card">
    <h2>Connectivity & Cloud Credentials</h2>
    <select id="connectivity">
      <option>MQTT</option>
      <option>Firebase</option>
      <option>Both</option>
    </select>
    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px; margin-top:12px;">
      <input id="ssid" placeholder="WiFi Name" value="">
      <input id="pass" type="password" placeholder="WiFi Password" value="">
    </div>
  </div>

  <!-- Board -->
  <div class="card">
    <h2>Select Board</h2>
    <select id="boardSelect" onchange="updatePinType()">
      <option value="">-- Select Board --</option>
      <option value="ESP32-S3-DevKitC">ESP32-S3-DevKitC N16R8</option>
      <option value="ESP32-S3-WROOM">ESP32-S3-WROOM-1</option>
      <option value="ESP32-WROVER">ESP32-WROVER</option>
      <option value="ESP32-DevKit">ESP32 DevKit V1</option>
      <option value="ESP8266">ESP8266 NodeMCU</option>
    </select>
  </div>

  <!-- Device Role -->
  <div class="card">
    <h2>Device Role</h2>
    
    <div>
      <button class="role-btn active" onclick="setRole(this, 'Mother Hub')">Mother Hub</button>
      <button class="role-btn" onclick="setRole(this, 'Child Node')">Child Node</button>
      <button class="role-btn" onclick="setRole(this, 'Hybrid')">Hybrid</button>
    </div>
    <p id="roleInfo" style="color:#e53935;margin:10px 0;">Selected: Mother Hub</p>

    <select id="roomSelect">
      <option>Master Bedroom</option>
      <option>Master Washroom</option>
      <option>Kitchen</option>
      <option>Living Room</option>
      <option>Hall</option>
      <option>Office Room</option>
      <option>Guest Room</option>
    </select>

    <label>Relay Count (1 - 32)</label>
    <select id="relayCount"></select>

    <button class="add-btn" onclick="addRoom()">+ Add Room</button>

    <div style="margin-top:20px;">
      <h2>Added Rooms</h2>
      <div id="roomsContainer"></div>
    </div>
  </div>

  <!-- Flash -->
  <div class="card">
    <h2>Flash</h2>
    <button onclick="generateMainC()">Generate Code</button>
    <button class="flash-btn" onclick="startWebFlash()">🚀 Factory Web Flasher</button>
  </div>

  <div class="log" id="log">Ready...</div>

<script>
let role = "Mother Hub";
let rooms = [];
let isD1Board = false;

function populateRelayCount() {
  const sel = document.getElementById('relayCount');
  sel.innerHTML = '';
  for(let i=1; i<=32; i++){
    let opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i;
    sel.appendChild(opt);
  }
}

function updatePinType() {
  const board = document.getElementById('boardSelect').value;
  isD1Board = (board === "ESP8266" || board === "ESP32-DevKit");
  renderRooms();
}

function setRole(btn, r) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  role = r;
  document.getElementById('roleInfo').innerText = `Selected: ${r}`;
}

function addRoom() {
  const roomName = document.getElementById('roomSelect').value;
  const relayCount = parseInt(document.getElementById('relayCount').value);

  if(!roomName) return alert("Please select room");

  rooms.push({
    room: roomName,
    relays: relayCount,
    pins: Array(relayCount).fill(1),
    devices: Array(relayCount).fill("Light")
  });

  renderRooms();
}

function renderRooms() {
  let html = "";
  rooms.forEach((room, roomIndex) => {
    html += `<div class="room-card">
      <strong>${room.room}</strong> — Relays: ${room.relays}
      <button onclick="removeRoom(${roomIndex})" style="float:right;background:#e53935;color:white;border:none;padding:6px 12px;border-radius:6px;">Remove</button>
      <div style="margin-top:12px;">`;

    for(let i = 0; i < room.relays; i++) {
      html += `
        <div class="relay-row">
          <select><option>IN${i+1}</option></select>
          <select onchange="updatePin(${roomIndex},${i},this.value)">
            ${generatePinOptions(room.pins[i])}
          </select>
          <select onchange="updateDevice(${roomIndex},${i},this.value)">
            ${generateDeviceOptions(room.devices[i])}
          </select>
        </div>`;
    }
    html += `</div></div>`;
  });
  document.getElementById('roomsContainer').innerHTML = html;
}

function generatePinOptions(selected) {
  let s = "";
  if (isD1Board) {
    for(let i=1; i<=100; i++) {
      s += `<option value="D${i}" ${"D"+i === selected ? 'selected' : ''}>D${i}</option>`;
    }
  } else {
    for(let i=1; i<=100; i++) {
      s += `<option value="${i}" ${i==selected?'selected':''}>GPIO ${i}</option>`;
    }
  }
  return s;
}

function generateDeviceOptions(selected) {
  const devs = ["Light","Fan","AC","Socket","Geyser","Exhaust Fan","TV","Curtain","RGB Light","Night Lamp"];
  return devs.map(d => `<option value="${d}" ${d===selected?'selected':''}>${d}</option>`).join('');
}

function updatePin(roomIndex, relayIndex, value) {
  rooms[roomIndex].pins[relayIndex] = value;
}

function updateDevice(roomIndex, relayIndex, value) {
  rooms[roomIndex].devices[relayIndex] = value;
}

function removeRoom(index) {
  rooms.splice(index,1);
  renderRooms();
}

function generateMainC() {
  let code = `/**
 * M-OS Firmware - Auto Generated
 * Role  : ${role}
 * Board : ${document.getElementById('boardSelect').value || 'Unknown'}
 * Date  : ${new Date().toLocaleString()}
 */\n\n`;

  code += `#include <stdio.h>\n#include "freertos/FreeRTOS.h"\n#include "freertos/task.h"\n#include "driver/gpio.h"\n#include "esp_log.h"\n\n`;
  code += `static const char *TAG = "M-OS";\n\nvoid app_main(void) {\n    ESP_LOGI(TAG, "M-OS Starting - Role: ${role}");\n\n`;

  rooms.forEach(room => {
    room.pins.forEach((pin, i) => {
      code += `    gpio_reset_pin(${pin});\n    gpio_set_direction(${pin}, GPIO_MODE_OUTPUT);\n    gpio_set_level(${pin}, 0);\n`;
    });
  });

  code += `\n    ESP_LOGI(TAG, "All relays initialized successfully");\n\n    while(1) {\n        vTaskDelay(pdMS_TO_TICKS(2000));\n    }\n}\n`;

  window.lastCode = code;
  document.getElementById('log').innerText = code;
}

function startWebFlash() {
  const log = document.getElementById('log');
  if (!("serial" in navigator)) {
    log.innerText = "Error: Chrome or Edge browser use cheyyandi!";
    return;
  }
  log.innerText = "⚡ Factory Web Flasher Starting...\nPlease connect your ESP device...";
}

// Initialize
populateRelayCount();
</script>
</body>
</html>
